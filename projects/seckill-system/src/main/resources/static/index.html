<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>秒杀系统 - Phase 12 实战项目</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        padding: 20px;
      }

      .container {
        max-width: 1200px;
        margin: 0 auto;
      }

      header {
        text-align: center;
        color: white;
        padding: 30px 0;
      }

      header h1 {
        font-size: 2.5rem;
        margin-bottom: 10px;
      }

      header p {
        opacity: 0.9;
      }

      .goods-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: 20px;
        margin-top: 30px;
      }

      .goods-card {
        background: white;
        border-radius: 16px;
        overflow: hidden;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        transition: transform 0.3s;
      }

      .goods-card:hover {
        transform: translateY(-5px);
      }

      .goods-img {
        height: 180px;
        background: linear-gradient(45deg, #f3f4f6, #e5e7eb);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 4rem;
      }

      .goods-info {
        padding: 20px;
      }

      .goods-name {
        font-size: 1.2rem;
        font-weight: 600;
        color: #1f2937;
        margin-bottom: 10px;
      }

      .goods-price {
        display: flex;
        align-items: baseline;
        gap: 10px;
        margin-bottom: 15px;
      }

      .seckill-price {
        font-size: 1.5rem;
        font-weight: 700;
        color: #ef4444;
      }

      .original-price {
        font-size: 0.9rem;
        color: #9ca3af;
        text-decoration: line-through;
      }

      .goods-stock {
        font-size: 0.9rem;
        color: #6b7280;
        margin-bottom: 15px;
      }

      .stock-count {
        color: #ef4444;
        font-weight: 600;
      }

      .btn-seckill {
        width: 100%;
        padding: 12px;
        border: none;
        border-radius: 8px;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s;
      }

      .btn-seckill.active {
        background: linear-gradient(135deg, #ef4444, #dc2626);
        color: white;
      }

      .btn-seckill.active:hover {
        background: linear-gradient(135deg, #dc2626, #b91c1c);
      }

      .btn-seckill.disabled {
        background: #e5e7eb;
        color: #9ca3af;
        cursor: not-allowed;
      }

      .btn-seckill.success {
        background: #10b981;
        color: white;
      }

      /* Modal */
      .modal {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.5);
        align-items: center;
        justify-content: center;
        z-index: 1000;
      }

      .modal.show {
        display: flex;
      }

      .modal-content {
        background: white;
        padding: 30px;
        border-radius: 16px;
        text-align: center;
        max-width: 400px;
        width: 90%;
      }

      .modal-content h3 {
        margin-bottom: 15px;
        color: #1f2937;
      }

      .modal-content p {
        color: #6b7280;
        margin-bottom: 20px;
      }

      .modal-content .result-icon {
        font-size: 4rem;
        margin-bottom: 15px;
      }

      .btn-close {
        padding: 10px 30px;
        border: none;
        border-radius: 8px;
        background: #6b7280;
        color: white;
        cursor: pointer;
      }

      /* User ID input */
      .user-section {
        background: white;
        padding: 15px 20px;
        border-radius: 12px;
        margin-bottom: 20px;
        display: flex;
        align-items: center;
        gap: 15px;
        flex-wrap: wrap;
      }

      .user-section label {
        font-weight: 600;
        color: #374151;
      }

      .user-section input {
        padding: 8px 15px;
        border: 2px solid #e5e7eb;
        border-radius: 8px;
        font-size: 1rem;
        width: 120px;
      }

      .user-section .tip {
        color: #9ca3af;
        font-size: 0.85rem;
      }

      .loading {
        display: inline-block;
        width: 16px;
        height: 16px;
        border: 2px solid #fff;
        border-top-color: transparent;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <header>
        <h1>🔥 秒杀专场</h1>
        <p>Phase 12 实战项目 - Redis + RabbitMQ + 分布式锁</p>
      </header>

      <div class="user-section">
        <label>用户ID:</label>
        <input type="number" id="userId" value="1" min="1" />
        <span class="tip">模拟不同用户进行秒杀测试</span>
      </div>

      <div class="goods-grid" id="goodsGrid">
        <!-- 商品列表动态加载 -->
        <div style="color: white; text-align: center; padding: 50px">
          加载中...
        </div>
      </div>
    </div>

    <!-- 结果弹窗 -->
    <div class="modal" id="resultModal">
      <div class="modal-content">
        <div class="result-icon" id="resultIcon">🎉</div>
        <h3 id="resultTitle">秒杀结果</h3>
        <p id="resultMessage">正在处理...</p>
        <button class="btn-close" onclick="closeModal()">关闭</button>
      </div>
    </div>

    <script>
      const API_BASE = "/api/seckill";

      // 商品图标映射
      const productIcons = {
        iPhone: "📱",
        MacBook: "💻",
        AirPods: "🎧",
        Watch: "⌚",
        iPad: "📲",
      };

      // 加载商品列表
      async function loadGoods() {
        try {
          const response = await fetch(`${API_BASE}/goods`);
          const result = await response.json();

          if (result.code === 200 && result.data) {
            renderGoods(result.data);
          } else {
            showError("加载商品失败");
          }
        } catch (error) {
          console.error("加载商品失败:", error);
          showError("无法连接服务器");
        }
      }

      // 渲染商品列表
      function renderGoods(goods) {
        const container = document.getElementById("goodsGrid");

        if (!goods.length) {
          container.innerHTML =
            '<div style="color: white; text-align: center; padding: 50px;">暂无秒杀商品</div>';
          return;
        }

        container.innerHTML = goods
          .map((item) => {
            const icon =
              Object.entries(productIcons).find(([key]) =>
                item.goodsName.includes(key)
              )?.[1] || "🛍️";
            const isSoldOut = item.stockCount <= 0;

            return `
                    <div class="goods-card" data-id="${item.id}">
                        <div class="goods-img">${icon}</div>
                        <div class="goods-info">
                            <div class="goods-name">${item.goodsName}</div>
                            <div class="goods-price">
                                <span class="seckill-price">¥${
                                  item.seckillPrice
                                }</span>
                                <span class="original-price">¥${
                                  item.originalPrice
                                }</span>
                            </div>
                            <div class="goods-stock">
                                剩余库存: <span class="stock-count" id="stock-${
                                  item.id
                                }">${item.stockCount}</span>
                            </div>
                            <button class="btn-seckill ${
                              isSoldOut ? "disabled" : "active"
                            }" 
                                    id="btn-${item.id}"
                                    onclick="doSeckill(${item.id})"
                                    ${isSoldOut ? "disabled" : ""}>
                                ${isSoldOut ? "已售罄" : "立即抢购"}
                            </button>
                        </div>
                    </div>
                `;
          })
          .join("");
      }

      // 执行秒杀
      async function doSeckill(goodsId) {
        const userId = document.getElementById("userId").value;
        const btn = document.getElementById(`btn-${goodsId}`);

        if (!userId) {
          alert("请输入用户ID");
          return;
        }

        // 禁用按钮
        btn.disabled = true;
        btn.innerHTML = '<span class="loading"></span> 抢购中...';

        try {
          const response = await fetch(
            `${API_BASE}/do?userId=${userId}&goodsId=${goodsId}`,
            {
              method: "POST",
            }
          );
          const result = await response.json();

          if (result.code === 200) {
            showResult("success", "🎉", "秒杀成功", result.message);
            // 轮询结果
            pollResult(userId, goodsId);
          } else {
            showResult("fail", "😢", "秒杀失败", result.message);
            btn.disabled = false;
            btn.innerHTML = "立即抢购";
            btn.className = "btn-seckill active";
          }

          // 刷新库存
          refreshStock(goodsId);
        } catch (error) {
          console.error("秒杀请求失败:", error);
          showResult("error", "❌", "系统错误", "网络异常，请稍后重试");
          btn.disabled = false;
          btn.innerHTML = "立即抢购";
        }
      }

      // 轮询秒杀结果
      async function pollResult(userId, goodsId) {
        let attempts = 0;
        const maxAttempts = 10;

        const poll = async () => {
          try {
            const response = await fetch(
              `${API_BASE}/result?userId=${userId}&goodsId=${goodsId}`
            );
            const result = await response.json();

            if (result.code === 200 && result.data) {
              // 订单创建成功
              const btn = document.getElementById(`btn-${goodsId}`);
              btn.innerHTML = "已抢到";
              btn.className = "btn-seckill success";
              return;
            }

            if (result.code !== 200 && !result.message.includes("排队")) {
              // 失败
              const btn = document.getElementById(`btn-${goodsId}`);
              btn.disabled = false;
              btn.innerHTML = "立即抢购";
              btn.className = "btn-seckill active";
              return;
            }

            // 继续轮询
            attempts++;
            if (attempts < maxAttempts) {
              setTimeout(poll, 1000);
            }
          } catch (error) {
            console.error("轮询失败:", error);
          }
        };

        setTimeout(poll, 500);
      }

      // 刷新库存
      async function refreshStock(goodsId) {
        try {
          const response = await fetch(`${API_BASE}/goods/${goodsId}`);
          const result = await response.json();

          if (result.code === 200 && result.data) {
            const stockEl = document.getElementById(`stock-${goodsId}`);
            const btnEl = document.getElementById(`btn-${goodsId}`);

            stockEl.textContent = result.data.stockCount;

            if (result.data.stockCount <= 0) {
              btnEl.disabled = true;
              btnEl.innerHTML = "已售罄";
              btnEl.className = "btn-seckill disabled";
            }
          }
        } catch (error) {
          console.error("刷新库存失败:", error);
        }
      }

      // 显示结果弹窗
      function showResult(type, icon, title, message) {
        document.getElementById("resultIcon").textContent = icon;
        document.getElementById("resultTitle").textContent = title;
        document.getElementById("resultMessage").textContent = message;
        document.getElementById("resultModal").classList.add("show");
      }

      // 关闭弹窗
      function closeModal() {
        document.getElementById("resultModal").classList.remove("show");
      }

      // 显示错误
      function showError(message) {
        const container = document.getElementById("goodsGrid");
        container.innerHTML = `
                <div style="color: white; text-align: center; padding: 50px;">
                    <p>⚠️ ${message}</p>
                    <button onclick="loadGoods()" style="margin-top: 15px; padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer;">
                        重试
                    </button>
                </div>
            `;
      }

      // 页面加载时获取商品
      document.addEventListener("DOMContentLoaded", loadGoods);

      // 每5秒刷新一次商品列表
      setInterval(loadGoods, 5000);
    </script>
  </body>
</html>
